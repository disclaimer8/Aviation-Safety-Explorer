<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Safety Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border: #334155;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
            min-height: 100vh;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .table-wrapper {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: rgba(0,0,0,0.2);
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        tr {
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: rgba(56, 189, 248, 0.05);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .fatalities {
            color: var(--danger);
            font-weight: 600;
        }

        a.source-link {
            display: inline-flex;
            align-items: center;
            padding: 0.4rem 0.8rem;
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        a.source-link:hover {
            background-color: var(--accent);
            color: #fff;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease;
        }

        .chart-container {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .chart-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Aviation Safety Explorer</h1>
            <p class="subtitle">Global Aviation Database & Analytics</p>
        </header>

        <div class="dashboard">
            <div class="chart-container">
                <h3 class="chart-title">Most Dangerous Aircraft Models</h3>
                <canvas id="aircraftChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 class="chart-title">Operators with Most Accidents</h3>
                <canvas id="operatorChart"></canvas>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Aircraft Model</th>
                        <th>Operator</th>
                        <th>Location</th>
                        <th>Fatalities</th>
                        <th>Source</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="6" class="loading">Loading data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchAccidents() {
            try {
                // Fetch up to 100 recent accidents
                const response = await fetch('/api/accidents?limit=100');
                if (!response.ok) throw new Error('Failed to fetch data');
                
                const json = await response.json();
                const data = json.data;
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = ''; // Clear loading state

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No records found. Run the scraper first!</td></tr>';
                    return;
                }

                data.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    
                    // Add slight stagger to animation
                    tr.style.animation = `fadeIn 0.5s ease ${index * 0.05}s both`;
                    
                    // Clean up fatalities string if it contains extra spaces
                    const fat = item.fatalities ? item.fatalities.replace(/\s+/g, ' ') : '0';

                    tr.innerHTML = `
                        <td>${item.date || 'Unknown'}</td>
                        <td><strong>${item.aircraft_model || 'Unknown'}</strong></td>
                        <td>${item.operator || '-'}</td>
                        <td>${item.location || '-'}</td>
                        <td class="${fat !== '0' && fat !== '' ? 'fatalities' : ''}">${fat || '0'}</td>
                        <td><a href="${item.source_url}" class="source-link" target="_blank">View Details</a></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('table-body').innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state" style="color: var(--danger)">
                            Failed to load data. Is the server running?
                        </td>
                    </tr>
                `;
            }
        }

        async function fetchStats() {
            try {
                const [airRes, opRes] = await Promise.all([
                    fetch('/api/stats/aircrafts'),
                    fetch('/api/stats/operators')
                ]);

                if (!airRes.ok || !opRes.ok) return;

                const airData = await airRes.json();
                const opData = await opRes.json();

                renderChart('aircraftChart', 'Accidents', airData.map(d => d.name), airData.map(d => d.count), '#ef4444');
                renderChart('operatorChart', 'Accidents', opData.map(d => d.name), opData.map(d => d.count), '#38bdf8');
            } catch (err) {
                console.error("Failed to load stats", err);
            }
        }

        function renderChart(canvasId, label, labels, data, color) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: color + '80', // add transparency
                        borderColor: color,
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', maxRotation: 45, minRotation: 45 } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchAccidents();
            fetchStats();
        });
    </script>
</body>
</html>
